<div id="page-product" class="page">
  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div>
        <div class="glass-dark rounded-3xl overflow-hidden mb-4">
          <img id="productMainImage" src="" class="w-full h-96 md:h-[500px] object-cover" alt="Product">
        </div>
        <div class="grid grid-cols-4 gap-3" id="productThumbnails"></div>
      </div>
      <div>
        <div id="productBadges" class="flex gap-2 mb-4"></div>
        <h1 id="productTitle" class="font-serif text-3xl md:text-4xl text-pink-900 mb-4"></h1>
        <div class="flex items-center gap-3 mb-6">
          <span id="productPrice" class="text-3xl font-bold text-pink-900"></span>
          <span id="productSalePrice" class="text-xl text-pink-500 line-through hidden"></span>
          <span id="productDiscount" class="clay-badge text-white text-sm px-3 py-1 hidden"></span>
        </div>
        <p id="productDescription" class="text-pink-700 mb-6 leading-relaxed"></p>
        
        <div class="mb-6">
          <label class="block text-sm font-semibold text-pink-900 mb-2">Quantity</label>
          <div class="flex items-center gap-3">
            <button onclick="changeProductQty(-1)" class="qty-btn">−</button>
            <span id="productQty" class="w-12 text-center font-semibold text-lg">1</span>
            <button onclick="changeProductQty(1)" class="qty-btn">+</button>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 mb-8">
          <button onclick="addToCartFromProduct()" class="btn-primary flex-1 text-center py-4">Add to Cart</button>
          <button onclick="toggleWishlistProduct()" class="btn-liquid px-6 py-4">♡ Wishlist</button>
        </div>

        <div class="glass rounded-2xl p-6 mb-6">
          <h3 class="font-serif text-xl text-pink-900 mb-3">Care Instructions</h3>
          <ul class="text-sm text-pink-700 space-y-2">
            <li>• Store in the provided jewellery box</li>
            <li>• Avoid contact with perfumes and chemicals</li>
            <li>• Clean with a soft cloth after wear</li>
            <li>• Anti-tarnish coating lasts for years</li>
          </ul>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="trust-badge flex items-center gap-3">
            <span class="text-2xl">✨</span>
            <div>
              <h4 class="font-semibold text-pink-900 text-sm">Anti-Tarnish</h4>
              <p class="text-xs text-pink-600">Lifetime guarantee</p>
            </div>
          </div>
          <div class="trust-badge flex items-center gap-3">
            <span class="text-2xl">🚚</span>
            <div>
              <h4 class="font-semibold text-pink-900 text-sm">Free Delivery</h4>
              <p class="text-xs text-pink-600">Above ₹999</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Related Products -->
    <div class="mt-16">
      <h2 class="font-serif text-3xl text-pink-900 mb-8">You May Also Like</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6" id="relatedProductsGrid"></div>
    </div>
  </div>
</div>

<!-- CART PAGE -->
